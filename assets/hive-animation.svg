<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 420">

  <rect width="1200" height="420" fill="#FFF8F3"/>

  <defs>

    <linearGradient id="honey">
      <stop offset="0%" stop-color="#FFE18A"/>
      <stop offset="100%" stop-color="#FFC847"/>
    </linearGradient>

    <polygon id="hex"
      points="25,0 50,14 50,42 25,56 0,42 0,14"/>

    <g id="bee">
      <ellipse cx="0" cy="0" rx="10" ry="7" fill="#FFC847"/>
      <rect x="-4" y="-7" width="2" height="14" fill="#222"/>
      <rect x="2" y="-7" width="2" height="14" fill="#222"/>

      <ellipse cx="-5" cy="-8" rx="4" ry="2"
               fill="white" opacity="0.7">
        <animateTransform
          attributeName="transform"
          type="scale"
          values="1 1;1 .6;1 1"
          dur="0.15s"
          repeatCount="indefinite"/>
      </ellipse>

      <ellipse cx="5" cy="-8" rx="4" ry="2"
               fill="white" opacity="0.7">
        <animateTransform
          attributeName="transform"
          type="scale"
          values="1 1;1 .6;1 1"
          dur="0.15s"
          repeatCount="indefinite"/>
      </ellipse>
    </g>

  </defs>

  <!-- Sakura petals -->

  <circle cx="150" cy="40" r="4" fill="#FFB6C8">
    <animate attributeName="cy"
             values="40;380"
             dur="18s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="600" cy="20" r="5" fill="#FFC7D9">
    <animate attributeName="cy"
             values="20;390"
             dur="22s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="1000" cy="50" r="4" fill="#FFB6C8">
    <animate attributeName="cy"
             values="50;400"
             dur="20s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Queen Bee -->

  <g transform="translate(120 180)">

    <ellipse cx="0" cy="0" rx="40" ry="28"
             fill="#FFC847"/>

    <rect x="-15" y="-28"
          width="8" height="56"
          fill="#222"/>

    <rect x="8" y="-28"
          width="8" height="56"
          fill="#222"/>

    <ellipse cx="-18" cy="-22"
             rx="12" ry="7"
             fill="white"
             opacity="0.7"/>

    <ellipse cx="18" cy="-22"
             rx="12" ry="7"
             fill="white"
             opacity="0.7"/>

    <polygon points="-10,-45 0,-70 10,-45"
             fill="#F7A900"/>

    <animateTransform
      attributeName="transform"
      type="translate"
      values="120 180;120 172;120 180"
      dur="4s"
      repeatCount="indefinite"/>

  </g>

  <!-- Honeycomb -->

  <g>

    <!-- Row 1 -->

    <g transform="translate(300 70)">
      <use href="#hex" fill="#FFF4D6" stroke="#E5C57A"/>
      <use href="#hex" fill="url(#honey)" opacity="0">
        <animate attributeName="opacity"
                 values="0;0;1;1"
                 dur="12s"
                 begin="0s"
                 repeatCount="indefinite"/>
      </use>
    </g>

    <g transform="translate(360 70)">
      <use href="#hex" fill="#FFF4D6" stroke="#E5C57A"/>
      <use href="#hex" fill="url(#honey)" opacity="0">
        <animate attributeName="opacity"
                 values="0;0;1;1"
                 dur="12s"
                 begin="1s"
                 repeatCount="indefinite"/>
      </use>
    </g>

    <g transform="translate(420 70)">
      <use href="#hex" fill="#FFF4D6" stroke="#E5C57A"/>
      <use href="#hex" fill="url(#honey)" opacity="0">
        <animate attributeName="opacity"
                 values="0;0;1;1"
                 dur="12s"
                 begin="2s"
                 repeatCount="indefinite"/>
      </use>
    </g>

    <g transform="translate(480 70)">
      <use href="#hex" fill="#FFF4D6" stroke="#E5C57A"/>
      <use href="#hex" fill="url(#honey)" opacity="0">
        <animate attributeName="opacity"
                 values="0;0;1;1"
                 dur="12s"
                 begin="3s"
                 repeatCount="indefinite"/>
      </use>
    </g>

    <g transform="translate(540 70)">
      <use href="#hex" fill="#FFF4D6" stroke="#E5C57A"/>
      <use href="#hex" fill="url(#honey)" opacity="0">
        <animate attributeName="opacity"
                 values="0;0;1;1"
                 dur="12s"
                 begin="4s"
                 repeatCount="indefinite"/>
      </use>
    </g>

    <!-- Row 2 -->

    <g transform="translate(330 120)">
      <use href="#hex" fill="#FFF4D6" stroke="#E5C57A"/>
    </g>

    <g transform="translate(390 120)">
      <use href="#hex" fill="#FFF4D6" stroke="#E5C57A"/>
    </g>

    <g transform="translate(450 120)">
      <use href="#hex" fill="#FFF4D6" stroke="#E5C57A"/>
    </g>

    <g transform="translate(510 120)">
      <use href="#hex" fill="#FFF4D6" stroke="#E5C57A"/>
    </g>

    <g transform="translate(570 120)">
      <use href="#hex" fill="#FFF4D6" stroke="#E5C57A"/>
    </g>

  </g>

  <!-- Worker Bee 1 -->

  <g>
    <use href="#bee">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="260 260;700 120;260 260"
        dur="10s"
        repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Worker Bee 2 -->

  <g>
    <use href="#bee">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="350 320;900 180;350 320"
        dur="12s"
        repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Worker Bee 3 -->

  <g>
    <use href="#bee">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="500 260;1000 120;500 260"
        dur="9s"
        repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Title -->

  <text x="600"
        y="390"
        text-anchor="middle"
        font-size="24"
        font-family="Verdana"
        fill="#8B5A2B">
    🌸 Sakurabee Hive Activity 🍯
  </text>

</svg>